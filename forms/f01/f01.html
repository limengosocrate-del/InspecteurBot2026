<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>F01 - Identification de l'entreprise</title>

<link rel="stylesheet" href="css/f01.css">
</head>

<body>

<div class="page">

    <!-- ENTÊTE -->

    <header class="header">

        <div class="logo">
            <img src="../../assets/logo.png" alt="Logo">
        </div>

        <div class="titre">

            <h2>
                RÉPUBLIQUE DÉMOCRATIQUE DU CONGO
            </h2>

            <h3>
                Ministère de l'Emploi et du Travail
            </h3>

            <h1>
                FORMULAIRE F01
            </h1>

            <p>
                IDENTIFICATION DE L'ÉTABLISSEMENT
            </p>

        </div>

    </header>

    <!-- Bloc Identification -->

    <section class="bloc">

        <table>

            <tr>

                <td>
                    Province
                </td>

                <td>
                    <input
                        type="text"
                        id="province">
                </td>

                <td>
                    Ville
                </td>

                <td>
                    <input
                        type="text"
                        id="ville">
                </td>

            </tr>

            <tr>

                <td>
                    Commune
                </td>

                <td>
                    <input
                        type="text"
                        id="commune">
                </td>

                <td>
                    Quartier
                </td>

                <td>
                    <input
                        type="text"
                        id="quartier">
                </td>

            </tr>

            <tr>

                <td>
                    Nom ou raison sociale
                </td>

                <td colspan="3">

                    <input
                        type="text"
                        id="entreprise">

                </td>

            </tr>

            <tr>

                <td>
                    Adresse
                </td>

                <td colspan="3">

                    <input
                        type="text"
                        id="adresse">

                </td>

            </tr>

        </table>

    </section>

<script src="js/f01.js"></script>

</body>
                      </html>
