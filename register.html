<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inscription | InspecteurBot-IA</title>

<link rel="stylesheet" href="assets/css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="background-animation"></div>

<div class="form-container">

<h1>

<i class="fas fa-user-plus"></i>

Créer un compte

</h1>

<form action="dashboard.html">

<div class="input-box">

<label>Nom complet</label>

<input type="text" placeholder="Votre nom complet" required>

</div>

<div class="input-box">

<label>Email</label>

<input type="email" placeholder="Votre adresse email" required>

</div>

<div class="input-box">

<label>Téléphone</label>

<input type="tel" placeholder="+243..." required>

</div>

<div class="input-box">

<label>Pays</label>

<select required>

<option value="">Choisir votre pays</option>

<option>RDC</option>

<option>Congo Brazzaville</option>

<option>Cameroun</option>

<option>Gabon</option>

<option>Sénégal</option>

<option>Côte d'Ivoire</option>

<option>Autre</option>

</select>

</div>

<div class="input-box">

<label>Profession</label>

<input type="text" placeholder="Inspecteur du Travail">

</div>

<div class="input-box">

<label>Mot de passe</label>

<input type="password" required>

</div>

<div class="input-box">

<label>Confirmer le mot de passe</label>

<input type="password" required>

</div>

<label class="check">

<input type="checkbox" required>

J'accepte les conditions d'utilisation.

</label>

<br><br>

<button class="btn-register">

Créer mon compte

</button>

</form>

<br>

<p>

Vous avez déjà un compte ?

<a href="login.html">

Se connecter

</a>

</p>

</div>

<footer>

Créé par <strong>Inspecteur Limengo (P. Miller)</strong>

© 2026.

Tous droits réservés.

</footer>

<script src="assets/js/app.js"></script>

</body>

</html>
